
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Woojuris | Direito do Trabalho</title>
    <meta name="description" content="Especialistas em Direito do Trabalho. Defendemos seus direitos com seriedade e combatividade.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', 'Montserrat', sans-serif;
        background-color: #ffffff;
        color: #0f172a;
      }
      h1, h2, h3, .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .textured-bg {
        background-color: #f8fafc;
      }
      html {
        scroll-behavior: smooth;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
      }
      .animation-delay-200 {
        animation-delay: 200ms;
      }
      .animation-delay-300 {
        animation-delay: 300ms;
      }

      .team-card::before {
        content: '';
        position: absolute;
        inset: -1px;
        background: linear-gradient(45deg, transparent, #3b82f6, transparent);
        opacity: 0;
        transition: opacity 0.5s;
        border-radius: 0.5rem;
      }
      .team-card:hover::before {
        opacity: 0.15;
      }
    </style>
