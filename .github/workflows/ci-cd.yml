name: Build e Deploy para Produção

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  # ============================================
  # 1. LINT & TYPE CHECK
  # ============================================
  lint:
    runs-on: ubuntu-latest
    name: Lint e Verificação de Tipos
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar dependências do backend
        working-directory: ./backend
        run: npm ci

      - name: Instalar dependências do frontend-painel
        working-directory: ./frontend-painel
        run: npm ci

  # ============================================
  # 2. BUILD & TESTS
  # ============================================
  build:
    runs-on: ubuntu-latest
    name: Build e Testes
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar dependências do backend
        working-directory: ./backend
        run: npm ci

      - name: Instalar dependências do frontend-painel
        working-directory: ./frontend-painel
        run: npm ci

      - name: Gerar Prisma Client
        working-directory: ./backend
        run: npm run prisma:generate || npx prisma generate

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Build frontend
        run: npm run build --workspace=frontend-painel || cd frontend-painel && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/dist
            frontend-painel/dist
            dist

  # ============================================
  # 3. DEPLOY PARA PRODUÇÃO
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    name: Deploy para Vercel
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Deploy para Vercel
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true

      - name: Notificar sucesso no deploy
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deploy para produção completado com sucesso!'
            })

  # ============================================
  # 4. SECURITY & VULNERABILITIES
  # ============================================
  security:
    runs-on: ubuntu-latest
    name: Verificação de Segurança
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar npm audit (root)
        run: npm audit --audit-level=moderate || true

      - name: Executar npm audit (backend)
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

      - name: Executar npm audit (frontend-painel)
        working-directory: ./frontend-painel
        run: npm audit --audit-level=moderate || true

      - name: Verificar secrets em código
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
