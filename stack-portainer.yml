version: "3.8"

services:
  # ============================================
  # Woojuris - Servidor Principal (API + Frontend Site + Painel)
  app:
    image: ghcr.io/fluowai/barsanolfo:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5032
      ALLOWED_ORIGINS: "https://woojuris.com.br,https://www.woojuris.com.br,https://app.woojuris.com.br"
      JWT_SECRET: "${JWT_SECRET}"
      DATABASE_URL: "${DATABASE_URL}"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      DATAJUD_API_KEY: "${DATAJUD_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ASAAS_API_KEY: "${ASAAS_API_KEY}"
      ASAAS_BASE_URL: "https://www.asaas.com/api/v3"
      WHATSAPP_INTERNAL_TOKEN: "${WHATSAPP_INTERNAL_TOKEN:-k7Pq9zLm2A8xR4vT6nY1cE5bH3sW0dJ}"
      LOG_LEVEL: info
    volumes:
      - whatsapp_sessions:/app/backend/whatsapp-sessions
      - uploads_data:/app/uploads
    networks:
      - woopanel1
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=woopanel1"
        - "traefik.http.routers.woojuris.rule=Host(`woojuris.com.br`) || Host(`www.woojuris.com.br`)"
        - "traefik.http.routers.woojuris.entrypoints=websecure"
        - "traefik.http.routers.woojuris.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.woojuris.priority=1"
        - "traefik.http.routers.woojuris.service=woojuris"
        - "traefik.http.services.woojuris.loadbalancer.server.port=5032"
        - "traefik.http.routers.woojuris.middlewares=woojuris_secHeaders"

        # Roteador específico para o painel (subdomínio app)
        - "traefik.http.routers.woojuris_painel.rule=Host(`app.woojuris.com.br`)"
        - "traefik.http.routers.woojuris_painel.entrypoints=websecure"
        - "traefik.http.routers.woojuris_painel.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.woojuris_painel.priority=10"
        - "traefik.http.routers.woojuris_painel.service=woojuris"
        - "traefik.http.routers.woojuris_painel.middlewares=woojuris_secHeaders"

        # Middleware de headers de segurança
        - "traefik.http.middlewares.woojuris_secHeaders.headers.customFrameOptionsValue=SAMEORIGIN"
        - "traefik.http.middlewares.woojuris_secHeaders.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.woojuris_secHeaders.headers.browserXssFilter=true"
        - "traefik.http.middlewares.woojuris_secHeaders.headers.referrerPolicy=strict-origin-when-cross-origin"

volumes:
  whatsapp_sessions:
    driver: local
  uploads_data:
    driver: local

networks:
  woopanel1:
    external: true
    name: woopanel1
