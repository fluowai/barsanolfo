  #     POSTGRES_USER: barsa
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
  #     POSTGRES_DB: barsa_db
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - barsa-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U barsa"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  barsa-network:
    driver: bridge

